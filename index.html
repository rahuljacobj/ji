<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hello</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0f172a; color:#fff; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
    #count { font-size:64px; }

    /* hidden owner panel */
    #ownerPanel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #ef4444;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="count">Loading...</div>

<div id="ownerPanel">
  <button onclick="resetCounter()">Reset to 0</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, runTransaction, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBKtRIyc5oKSGMzVMDBNWW9WIT4WL6QWfY",
    authDomain: "counter-4d108.firebaseapp.com",
    databaseURL: "https://counter-4d108-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "counter-4d108",
    storageBucket: "counter-4d108.firebasestorage.app",
    messagingSenderId: "1044074886541",
    appId: "1:1044074886541:web:83add4000a631695bcb9c4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const countEl = document.getElementById("count");
  const ownerPanel = document.getElementById("ownerPanel");

  async function updateCounter() {
    try {
      const counterRef = ref(db, 'visits');

      const result = await runTransaction(counterRef, (current) => {
        return (current || 0) + 1;
      });

      const count = result.snapshot.val();
      countEl.textContent = count.toLocaleString();

    } catch (error) {
      console.error(error);
      countEl.textContent = "Error";
    }
  }

  async function resetCounter() {
    try {
      const counterRef = ref(db, 'visits');
      await set(counterRef, 0);
      countEl.textContent = "0";
    } catch (e) {
      console.error(e);
    }
  }

  // secret owner mode: type "owner"
  let buffer = "";
  document.addEventListener("keydown", (e) => {
    buffer += e.key.toLowerCase();
    buffer = buffer.slice(-5);

    if (buffer === "owner") {
      ownerPanel.style.display = "block";
    }
  });

  updateCounter();
</script>

</body>
</html>
