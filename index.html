<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitor Counter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #1e293b;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    h1 {
      margin-bottom: 10px;
    }
    #count {
      font-size: 48px;
      margin: 20px 0;
    }
    .status {
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Visitors</h1>
  <div id="count">Loading...</div>
  <div class="status" id="status">Connecting...</div>
</div>

<script>
// ===== SIMPLE & RELIABLE COUNTER (NO FIREBASE NEEDED) =====

const namespace = "rahuljacobj"; // change if needed
const key = "visitor-count";

const countEl = document.getElementById("count");
const statusEl = document.getElementById("status");

async function updateCounter() {
  try {
    statusEl.textContent = "Counting your visit...";

    const res = await fetch(`https://api.counterapi.dev/v1/${namespace}/${key}/up`);
    const data = await res.json();

    if (!data || typeof data.count !== "number") {
      throw new Error("Invalid response");
    }

    countEl.textContent = data.count.toLocaleString();
    statusEl.textContent = "Visit counted successfully";

  } catch (err) {
    console.error(err);

    // fallback (read-only)
    try {
      const res = await fetch(`https://api.counterapi.dev/v1/${namespace}/${key}`);
      const data = await res.json();

      countEl.textContent = data.count || "0";
      statusEl.textContent = "Showing saved count (write failed)";

    } catch (err2) {
      countEl.textContent = "Error";
      statusEl.textContent = "Failed to connect. Check internet or hosting.";
    }
  }
}

updateCounter();
</script>

</body>
</html>
