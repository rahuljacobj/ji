<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitor Counter (Firebase)</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0f172a; color:#fff; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
    .card { background:#1e293b; padding:40px; border-radius:16px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.4); }
    h1 { margin-bottom:10px; }
    #count { font-size:48px; margin:20px 0; }
    .status { font-size:14px; opacity:.7; }
  </style>
</head>
<body>

<div class="card">
  <h1>Visitors</h1>
  <div id="count">Loading...</div>
  <div class="status" id="status">Connecting to Firebase...</div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // 🔴 REPLACE WITH YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    databaseURL: "https://counter-4d108-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const countEl = document.getElementById("count");
  const statusEl = document.getElementById("status");

  async function updateCounter() {
    try {
      const counterRef = ref(db, 'visits');

      const snapshot = await get(counterRef);
      let count = snapshot.exists() ? snapshot.val() : 0;

      count = count + 1;

      await set(counterRef, count);

      countEl.textContent = count.toLocaleString();
      statusEl.textContent = "Live count (Firebase)";

    } catch (error) {
      console.error(error);
      countEl.textContent = "Error";
      statusEl.textContent = "Firebase connection failed";
    }
  }

  updateCounter();
</script>

</body>
</html>
