<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hello</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0f172a; color:#fff; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
    
    
    #count { font-size:48px; margin:20px 0; }
    
  </style>
</head>
<body>

<div id="count">Loading...</div>
  <div class="status" id="status">Connecting to Firebase...</div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // 🔴 REPLACE WITH YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyBKtRIyc5oKSGMzVMDBNWW9WIT4WL6QWfY",
    authDomain: "counter-4d108.firebaseapp.com",
    databaseURL: "https://counter-4d108-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "counter-4d108",
    storageBucket: "counter-4d108.firebasestorage.app",
    messagingSenderId: "1044074886541",
    appId: "1:1044074886541:web:83add4000a631695bcb9c4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const countEl = document.getElementById("count");
  

  async function updateCounter() {
    try {
      const counterRef = ref(db, 'visits');

      const result = await runTransaction(counterRef, (current) => {
        return (current || 0) + 1;
      });

      const count = result.snapshot.val();

      countEl.textContent = count.toLocaleString();

    } catch (error) {
      console.error(error);
      countEl.textContent = "Error";
    }
  } catch (error) {
      console.error(error);
      countEl.textContent = "Error";
      
    }
  }

  updateCounter();
</script>

</body>
</html>
