<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitor Counter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #1e293b;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    h1 { margin-bottom: 10px; }
    #count { font-size: 48px; margin: 20px 0; }
    .status { font-size: 14px; opacity: 0.7; }
  </style>
</head>
<body>

<div class="card">
  <h1>Visitors</h1>
  <div id="count">Loading...</div>
  <div class="status" id="status">Connecting...</div>
</div>

<script>
// ===== BULLETPROOF COUNTER (WORKS EVEN IF APIs FAIL) =====

const namespace = "rahuljacobj";
const key = "visitor-count";

const countEl = document.getElementById("count");
const statusEl = document.getElementById("status");

async function updateCounter() {
  try {
    statusEl.textContent = "Trying primary server...";

    // TRY 1: countapi.xyz
    let res = await fetch(`https://api.countapi.xyz/hit/${namespace}/${key}`);
    let data = await res.json();

    if (data && typeof data.value === "number") {
      countEl.textContent = data.value.toLocaleString();
      statusEl.textContent = "Live count (primary server)";
      return;
    }

    throw new Error("Primary failed");

  } catch (e1) {
    try {
      statusEl.textContent = "Trying backup server...";

      // TRY 2: counterapi.dev
      let res = await fetch(`https://api.counterapi.dev/v1/${namespace}/${key}/up`);
      let data = await res.json();

      if (data && typeof data.count === "number") {
        countEl.textContent = data.count.toLocaleString();
        statusEl.textContent = "Live count (backup server)";
        return;
      }

      throw new Error("Backup failed");

    } catch (e2) {

      // FINAL FALLBACK: localStorage (ALWAYS WORKS)
      let localCount = localStorage.getItem("visitor_count");
      localCount = localCount ? parseInt(localCount) + 1 : 1;
      localStorage.setItem("visitor_count", localCount);

      countEl.textContent = localCount.toLocaleString();
      statusEl.textContent = "Offline mode (device-based count)";
    }
  }
}

updateCounter();
</script>

</body>
</html>
